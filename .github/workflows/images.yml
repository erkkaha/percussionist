name: Publish Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (leave blank for manual-<sha>)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: runner
            dockerfile: images/runner/Dockerfile
            context: images/runner
          - image: operator
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=operator
          - image: dispatcher
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=dispatcher
          - image: manager
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=manager-controller
          - image: web
            dockerfile: images/web/Dockerfile
            context: .
          - image: memory
            dockerfile: images/memory/Dockerfile
            context: .
          - image: code-server
            dockerfile: images/code-server/Dockerfile
            context: images/code-server

    steps:
      - uses: actions/checkout@v4

      - name: Normalize version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG=""
          fi

          if [[ -n "$TAG" ]]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "tag_no_v=${TAG#v}" >> "$GITHUB_OUTPUT"
            if [[ "$TAG" == *-* ]]; then
              echo "channel=beta" >> "$GITHUB_OUTPUT"
            else
              echo "channel=latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ steps.ver.outputs.tag_no_v }},enable=${{ steps.ver.outputs.tag != '' }}
            type=raw,value=${{ steps.ver.outputs.tag }},enable=${{ steps.ver.outputs.tag != '' }}
            type=raw,value=latest,enable=${{ steps.ver.outputs.channel == 'latest' }}
            type=raw,value=beta,enable=${{ steps.ver.outputs.channel == 'beta' }}
            type=raw,value=manual-${{ github.sha }},enable=${{ steps.ver.outputs.tag == '' }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve web version
        id: web_version
        if: matrix.image == 'web'
        run: |
          echo "version=${{ steps.ver.outputs.tag_no_v }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.image == 'web' && format('VERSION={0}', steps.web_version.outputs.version) || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --output CHANGELOG.md --tag "${{ steps.tag.outputs.tag }}"

      - name: Create Release
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          body_path: CHANGELOG.md
          prerelease: ${{ contains(steps.tag.outputs.tag, '-') }}
          make_latest: ${{ !contains(steps.tag.outputs.tag, '-') }}
