name: Publish Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (leave blank for manual-<sha>)"
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: runner
            dockerfile: images/runner/Dockerfile
            context: images/runner
          - image: operator
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=operator
          - image: dispatcher
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=dispatcher
          - image: manager
            dockerfile: images/node/Dockerfile
            context: .
            build_args: PKG=manager-controller
          - image: web
            dockerfile: images/web/Dockerfile
            context: .
          - image: memory
            dockerfile: images/memory/Dockerfile
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=${{ inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag != '' }}
            type=raw,value=manual-${{ github.sha }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve web version
        id: web_version
        if: matrix.image == 'web'
        run: |
          version=$(node -p "require('./packages/web/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ${{ matrix.build_args }}
            ${{ matrix.image == 'web' && format('VERSION={0}', steps.web_version.outputs.version) || '' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
