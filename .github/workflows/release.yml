name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      pre-release:
        description: "Beta / pre-release"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.strict-dep-builds=false

      - name: Build
        run: pnpm build

      - name: Run unit & smoke tests
        run: pnpm test

      - name: Determine next version
        id: version
        run: |
          git fetch --tags origin
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -t. -k1,1V -k2,2V -k3,3V | tail -1)
          LATEST="${LATEST_TAG#v}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          if [[ "${{ github.event.inputs.pre-release }}" == "true" ]]; then
            BETA_NUM=1
            EXISTING=$(git tag -l "${VERSION}-beta.*" | sort -t. -k4,4n | tail -1)
            if [[ -n "$EXISTING" ]]; then
              BETA_NUM=$((${EXISTING##*-beta.} + 1))
            fi
            VERSION="${VERSION}-beta.${BETA_NUM}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: --output CHANGELOG.md --tag "${{ steps.version.outputs.version }}"

      - name: Bump package versions
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NO_V="${VERSION#v}"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.version = '$VERSION_NO_V';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          for pkg in packages/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg'));
              pkg.version = '$VERSION_NO_V';
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.version }}"
          git push origin main
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          prerelease: ${{ github.event.inputs.pre-release == 'true' }}
          make_latest: ${{ github.event.inputs.pre-release != 'true' }}

      - name: Dispatch image builds
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run images.yml \
            --ref main \
            --field tag="${{ steps.version.outputs.version }}"
