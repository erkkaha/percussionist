# ClusterAgent — cluster-scoped catalog of reusable agent definitions.
#
# Admins create ClusterAgents to make agents available across all projects
# and runs without duplicating content. The operator watches them read-only;
# they are not reconciled into pods themselves — instead, a run references
# one by name (spec.agent) or includes inline copies in spec.agents[].

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusteragents.percussionist.dev
spec:
  group: percussionist.dev
  scope: Cluster
  names:
    kind: ClusterAgent
    listKind: ClusterAgentList
    singular: clusteragent
    plural: clusteragents
    shortNames:
      - ca
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  maxLength: 102400
                  description: |
                    Full .md file contents (YAML front-matter + system prompt).
                    Max 100KB. This is the same format as files placed under
                    images/runner/content/agents/<name>.md or
                    <workspace>/.opencode/agents/<name>.md.
