# OpenCodeKanban v1alpha1 — kanban board for agentic development.
# Tracks feature-sized tasks flowing through columns (ready → in-progress → review → done).
# A persistent manager controller watches this CR and dispatches worker runs.
# Keep in sync with packages/api/src/index.ts (Zod schemas are authoritative at runtime).
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opencodekanbans.percussionist.dev
spec:
  group: percussionist.dev
  scope: Namespaced
  names:
    kind: OpenCodeKanban
    listKind: OpenCodeKanbanList
    singular: opencodekanban
    plural: opencodekanbans
    shortNames:
      - okanban
      - kanban
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.backlog.ready
          priority: 1
        - name: Active
          type: integer
          jsonPath: .status.activeWorkers
          priority: 1
        - name: MaxParallel
          type: integer
          jsonPath: .spec.maxParallel
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              properties:
                displayName:
                  type: string
                  description: Human-readable label; falls back to metadata.name.
                # Git workspace all workers clone from (same shape as OpenCodeRun's source.git).
                source:
                  type: object
                  description: |
                    Workspace source. When `git` is set, worker pods clone the repo
                    into /workspace before the runner starts.
                  properties:
                    git:
                      type: object
                      required: [url]
                      properties:
                        url:
                          type: string
                          minLength: 1
                          description: Any URL git(1) accepts (https, ssh, git://, file://).
                        ref:
                          type: string
                          description: |
                            Branch, tag, or commit SHA. Omitted = remote HEAD.
                        sshSecret:
                          type: object
                          required: [name]
                          properties:
                            name: { type: string, minLength: 1 }
                            key:
                              type: string
                              default: ssh-privatekey
                        author:
                          type: object
                          required: [name, email]
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                # Default run config inherited by all worker runs.
                defaults:
                  type: object
                  properties:
                    model:
                      type: string
                      description: Model in provider/model form (e.g. local/llama3.1-70b).
                    timeoutSeconds:
                      type: integer
                      minimum: 60
                      default: 14400
                      description: Hard timeout per worker run (seconds). Default 4h for local LLM.
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          additionalProperties: { type: string }
                        limits:
                          type: object
                          additionalProperties: { type: string }
                # WIP limit — how many concurrent worker runs the manager dispatches.
                maxParallel:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 2
                  description: |
                    Maximum number of in-progress tasks (active workers).
                    Defaults to 2 for EliteDesk sizing with local LLM.
                # Agent definitions available to workers (same shape as OpenCodeRun's agents[]).
                agents:
                  type: array
                  maxItems: 5
                  description: |
                    Inline agent definitions injected into worker pods.
                    Max 5 agents, each content capped at 100KB.
                  items:
                    type: object
                    required: [name, content]
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                        description: Unique agent name (used as filename and selection key).
                      content:
                        type: string
                        maxLength: 102400
                        description: Full .md file contents. Max 100KB.
                # Human-defined backlog items added to the board.
                tasks:
                  type: array
                  maxItems: 100
                  description: |
                    Initial task definitions. Tasks can also be added/removed via CLI
                    or by patching status.backlog directly. Max 100 tasks per kanban.
                  items:
                    type: object
                    required: [id, title]
                    properties:
                      id:
                        type: string
                        minLength: 1
                        maxLength: 32
                        description: Unique task identifier (e.g. "F-104", "BUG-42").
                      title:
                        type: string
                        minLength: 1
                        maxLength: 256
                        description: Short human-readable title.
                      description:
                        type: string
                        maxLength: 8192
                        description: |
                          Detailed acceptance criteria and context sent to the worker agent.
                          Max 8KB to keep CR size manageable.
                      priority:
                        type: string
                        enum: [high, medium, low]
                        default: medium
                        description: Task priority for ordering within a column.
                # Board lifecycle state.
                phase:
                  type: string
                  enum: [Active, Complete, Archived]
                  default: Active
                  description: |
                    Board lifecycle. Active = manager dispatches workers.
                    Complete = no new tasks accepted but existing workers finish.
                    Archived = board closed, manager stops, CR kept for history.
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Active, Complete, Archived]
                  description: Mirrors spec.phase with operational state.
                columns:
                  type: array
                  items: { type: string }
                  default: [ready, in-progress, review, rework, done]
                  description: Ordered list of column names on the kanban board.
                backlog:
                  type: object
                  additionalProperties:
                    type: array
                    items: { type: string }
                  default: { ready: [] }
                  description: |
                    Map of column name → task ID array. The manager moves task IDs
                    between these arrays as work progresses. Human can patch this
                    directly for rework (review → rework) or manual overrides.
                workers:
                  type: array
                  description: Active worker run tracking.
                  items:
                    type: object
                    required: [taskId, status]
                    properties:
                      taskId:
                        type: string
                        minLength: 1
                        description: Task ID this worker is handling.
                      runName:
                        type: string
                        description: OpenCodeRun name created for this worker.
                      status:
                        type: string
                        enum: [Running, Succeeded, Failed, Escalated]
                        description: Current worker state.
                      branch:
                        type: string
                        description: Git branch (e.g. "feat/F-104").
                      prNumber:
                        type: integer
                        minimum: 1
                        description: GitHub PR number if opened.
                      startedAt:
                        type: string
                        description: ISO timestamp when worker started.
                      completedAt:
                        type: string
                        description: ISO timestamp when worker finished.
                      escalation:
                        type: string
                        maxLength: 4096
                        description: |
                          Escalation text written by the manager when a worker is stuck.
                          Includes what failed, what was tried, and what's needed from human.
                      retryCount:
                        type: integer
                        minimum: 0
                        default: 0
                        description: Number of retry attempts for this task.
                activeWorkers:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Count of workers with Running status (for printer column).
                escalations:
                  type: array
                  items: { type: string }
                  description: |
                    JSON-serialized escalation messages for quick CLI/UI access.
                    Each entry is a full escalation text block from a worker.
                lastEventAt:
                  type: string
                  description: ISO timestamp of the most recent state change.
