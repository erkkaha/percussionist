apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opencodeprojects.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: OpenCodeProject
    plural: opencodeprojects
    singular: opencodeproject
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.board.phase
        - name: Workers
          type: integer
          jsonPath: .status.board.activeWorkers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                displayName:
                  type: string
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        githubTokenSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                      required:
                        - url
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    opencodeAuthSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                    opencodeConfigMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                model:
                  type: string
                agent:
                  type: string
                image:
                  type: string
                timeoutSeconds:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                sidecars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      image:
                        type: string
                        minLength: 1
                      env:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            value:
                              type: string
                          required:
                            - name
                            - value
                        maxItems: 32
                      ports:
                        type: array
                        items:
                          type: integer
                          minimum: 1
                          maximum: 65535
                        maxItems: 8
                    required:
                      - name
                      - image
                  maxItems: 5
                injectFiles:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                        minLength: 1
                        maxLength: 255
                        pattern: ^[^/]+$
                      secretRef:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                        required:
                          - name
                    required:
                      - filename
                      - secretRef
                  maxItems: 20
                board:
                  type: object
                  properties:
                    maxParallel:
                      type: integer
                      minimum: 1
                      maximum: 20
                    agents:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 63
                        required:
                          - name
                    tasks:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            minLength: 1
                            maxLength: 32
                          title:
                            type: string
                            minLength: 1
                            maxLength: 256
                          description:
                            type: string
                            maxLength: 8192
                          priority:
                            type: string
                            enum:
                              - high
                              - medium
                              - low
                          agent:
                            type: string
                            minLength: 1
                        required:
                          - id
                          - title
                          - agent
                      maxItems: 100
                    overrides:
                      type: object
                      properties:
                        model:
                          type: string
                        image:
                          type: string
                        timeoutSeconds:
                          type: integer
                          exclusiveMinimum: true
                          minimum: 0
                        resources:
                          type: object
                          properties:
                            requests:
                              type: object
                              x-kubernetes-preserve-unknown-fields: true
                            limits:
                              type: object
                              x-kubernetes-preserve-unknown-fields: true
                    phase:
                      type: string
                      enum:
                        - Active
                        - Complete
                        - Archived
            status:
              type: object
              properties:
                board:
                  type: object
                  properties:
                    columns:
                      type: array
                      items:
                        type: string
                    backlog:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    workers:
                      type: array
                      items:
                        type: object
                        properties:
                          taskId:
                            type: string
                            minLength: 1
                          runName:
                            type: string
                          status:
                            type: string
                            enum:
                              - Running
                              - Succeeded
                              - Failed
                              - Escalated
                          branch:
                            type: string
                          prNumber:
                            type: integer
                            minimum: 1
                          startedAt:
                            type: string
                          completedAt:
                            type: string
                          escalation:
                            type: string
                            maxLength: 4096
                          retryCount:
                            type: integer
                            minimum: 0
                          facilitated:
                            type: boolean
                          facilitationRunName:
                            type: string
                          reviewRunName:
                            type: string
                          facilitationResult:
                            type: object
                            properties:
                              diagnosis:
                                type: string
                                maxLength: 1024
                              recommendedAction:
                                type: string
                                enum:
                                  - retry_same
                                  - retry_alternative
                                  - skip
                                  - approve
                                  - escalate
                              alternativeAgent:
                                type: string
                                maxLength: 63
                              suggestion:
                                type: string
                                maxLength: 4096
                            required:
                              - diagnosis
                              - recommendedAction
                        required:
                          - taskId
                          - status
                    activeWorkers:
                      type: integer
                      minimum: 0
                    escalations:
                      type: array
                      items:
                        type: string
                    pendingQuestions:
                      type: array
                      items:
                        type: object
                        properties:
                          workerId:
                            type: string
                          sessionID:
                            type: string
                          messageText:
                            type: string
                            maxLength: 16384
                        required:
                          - workerId
                          - sessionID
                          - messageText
                    facilitations:
                      type: array
                      items:
                        type: object
                        properties:
                          diagnosis:
                            type: string
                            maxLength: 1024
                          recommendedAction:
                            type: string
                            enum:
                              - retry_same
                              - retry_alternative
                              - skip
                              - approve
                              - escalate
                          alternativeAgent:
                            type: string
                            maxLength: 63
                          suggestion:
                            type: string
                            maxLength: 4096
                        required:
                          - diagnosis
                          - recommendedAction
                    lastEventAt:
                      type: string
                    managerMetrics:
                      type: object
                      properties:
                        lastReconcileAt:
                          type: string
                        lastReconcileDurationMs:
                          type: integer
                          minimum: 0
                        lastReconcileResult:
                          type: string
                          enum:
                            - success
                            - error
                        lastError:
                          type: string
                        tasksPulled:
                          type: integer
                          minimum: 0
                        workersMonitored:
                          type: integer
                          minimum: 0
                        tasksReworked:
                          type: integer
                          minimum: 0
          required:
            - spec
