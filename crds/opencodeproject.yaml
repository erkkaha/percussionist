apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opencodeprojects.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: OpenCodeProject
    plural: opencodeprojects
    singular: opencodeproject
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.board.phase
        - name: Workers
          type: integer
          jsonPath: .status.board.activeWorkers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                displayName:
                  type: string
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                      required:
                        - url
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    opencodeAuthSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                    opencodeConfigMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                model:
                  type: string
                image:
                  type: string
                timeoutSeconds:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                    limits:
                      type: object
                board:
                  type: object
                  properties:
                    maxParallel:
                      type: integer
                      minimum: 1
                      maximum: 20
                    agents:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                            maxLength: 63
                        required:
                          - name
                    tasks:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            minLength: 1
                            maxLength: 32
                          title:
                            type: string
                            minLength: 1
                            maxLength: 256
                          description:
                            type: string
                            maxLength: 8192
                          priority:
                            type: string
                            enum:
                              - high
                              - medium
                              - low
                          agent:
                            type: string
                            minLength: 1
                        required:
                          - id
                          - title
                          - agent
                      maxItems: 100
                    overrides:
                      type: object
                      properties:
                        model:
                          type: string
                        image:
                          type: string
                        timeoutSeconds:
                          type: integer
                          exclusiveMinimum: true
                          minimum: 0
                        resources:
                          type: object
                          properties:
                            requests:
                              type: object
                            limits:
                              type: object
                    phase:
                      type: string
                      enum:
                        - Active
                        - Complete
                        - Archived
            status:
              type: object
              properties:
                board:
                  type: object
                  properties:
                    columns:
                      type: array
                      items:
                        type: string
                    backlog:
                      type: object
                    workers:
                      type: array
                      items:
                        type: object
                        properties:
                          taskId:
                            type: string
                            minLength: 1
                          runName:
                            type: string
                          status:
                            type: string
                            enum:
                              - Running
                              - Succeeded
                              - Failed
                              - Escalated
                          branch:
                            type: string
                          prNumber:
                            type: integer
                            minimum: 1
                          startedAt:
                            type: string
                          completedAt:
                            type: string
                          escalation:
                            type: string
                            maxLength: 4096
                          retryCount:
                            type: integer
                            minimum: 0
                        required:
                          - taskId
                          - status
                    activeWorkers:
                      type: integer
                      minimum: 0
                    escalations:
                      type: array
                      items:
                        type: string
                    pendingQuestions:
                      type: array
                      items:
                        type: object
                        properties:
                          workerId:
                            type: string
                          sessionID:
                            type: string
                          messageText:
                            type: string
                            maxLength: 16384
                        required:
                          - workerId
                          - sessionID
                          - messageText
                    lastEventAt:
                      type: string
          required:
            - spec
