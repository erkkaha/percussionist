apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opencoderuns.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: OpenCodeRun
    plural: opencoderuns
    singular: opencoderun
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                project:
                  type: string
                  minLength: 1
                boardTask:
                  type: string
                task:
                  type: string
                  minLength: 1
                interactive:
                  type: boolean
                agent:
                  type: string
                agents:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                    required:
                      - name
                  maxItems: 10
                inlineAgents:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      content:
                        type: string
                        maxLength: 102400
                    required:
                      - name
                      - content
                  maxItems: 5
                model:
                  type: string
                image:
                  type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    opencodeAuthSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                    opencodeConfigMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                      required:
                        - url
                timeoutSeconds:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                ttlSecondsAfterFinished:
                  type: integer
                  minimum: 0
                expose:
                  type: object
                  properties:
                    web:
                      type: boolean
              required:
                - project
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Initializing
                    - Running
                    - WaitingForInput
                    - Succeeded
                    - Failed
                    - Cancelled
                message:
                  type: string
                podName:
                  type: string
                serviceName:
                  type: string
                sessionID:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                lastEventAt:
                  type: string
                tokensIn:
                  type: integer
                  minimum: 0
                tokensOut:
                  type: integer
                  minimum: 0
                webURL:
                  type: string
                ingressName:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                    required:
                      - type
                      - status
          required:
            - spec
