# RBAC, Service, and Deployment for the percussionist web dashboard.
#
# The web server is read-only: it lists OpenCodeRuns and reads pod logs.
# It uses its own ServiceAccount with minimal permissions.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: percussionist-web
  namespace: percussionist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: percussionist-web
  namespace: percussionist
rules:
  # Read OpenCodeRun resources (list + detail views).
  - apiGroups: ["percussionist.dev"]
    resources: ["opencoderuns"]
    verbs: ["get", "list", "watch"]
  # Read pods (needed to resolve podName and read logs).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read secrets (needed to authenticate against OpenCode API in run pods).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: percussionist-web
  namespace: percussionist
subjects:
  - kind: ServiceAccount
    name: percussionist-web
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: percussionist-web
---
apiVersion: v1
kind: Service
metadata:
  name: percussionist-web
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: percussionist-web
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: percussionist-web
      containers:
        - name: web
          image: percussionist/web:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WATCH_NAMESPACE
              value: percussionist
            - name: PORT
              value: "8080"
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
