# OpenCodeRun with a git workspace.
#
# The operator injects an init container (using the runner image) that
# clones spec.source.git.url into /workspace before `opencode serve`
# starts. The runner's working directory is /workspace, so the agent sees
# the repo tree directly.
#
# Public repo → no sshSecret needed. For private repos, create a Secret
# of type `kubernetes.io/ssh-auth` and reference it under
# `spec.source.git.sshSecret` (see the commented-out block below).
#
# Apply:
#   kubectl apply -f examples/git-run.yaml
#   beatctl attach git-demo   # or: beatctl logs git-demo -f
apiVersion: percussionist.dev/v1alpha1
kind: OpenCodeRun
metadata:
  name: git-demo
  namespace: percussionist
spec:
  task: |
    List the top-level files and folders in the workspace, then summarise
    what this repository is for in one sentence. Do not modify anything.
  source:
    git:
      url: https://github.com/octocat/Hello-World.git
      # ref: main          # optional; omit to use the remote's default branch
      # sshSecret:
      #   name: agent-key  # a Secret with key `ssh-privatekey` (type: kubernetes.io/ssh-auth)
      #   # key: ssh-privatekey   # override if the secret uses a different key
  secrets:
    llmKeysSecret: llm-keys
  timeoutSeconds: 600
