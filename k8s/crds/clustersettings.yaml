apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clustersettings.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: ClusterSettings
    plural: clustersettings
    singular: clustersettings
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    opencodeAuthSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                    opencodeConfigMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                  description: Cluster-wide secret references. Inherited by all projects and runs unless overridden.
                runnerConfig:
                  type: object
                  properties:
                    config:
                      type: string
                      description: Raw opencode.json content. When set, the operator generates the opencode-config ConfigMap from this string.
                    configMapRef:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                  description: OpenCode runtime configuration. Takes precedence over manually-managed opencode-config ConfigMap when set.
                manager:
                  type: object
                  properties:
                    agentName:
                      type: string
                      default: manager-agent
                    decisionAgentName:
                      type: string
                      default: manager-decision
                    model:
                      type: string
                      description: Default model for manager decision sessions.
                    decisionAgentContent:
                      type: string
                      maxLength: 102400
                      description: Full .md file contents (YAML front-matter + system prompt) for the decision agent role. Replaces manager-decision.md.
                    timeoutMs:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 1
                      default: 30000
                    firstResponseTimeoutMs:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 1
                      description: Max ms to wait for the first assistant message before timing out. Defaults to min(timeoutMs, 60000) when unset.
                  description: Manager agent configuration.
                runner:
                  type: object
                  properties:
                    image:
                      type: string
                      default: percussionist/runner:dev
                    timeoutSeconds:
                      type: integer
                      exclusiveMinimum: true
                      minimum: 1
                      default: 3600
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        limits:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                   description: Default runner pod settings for all projects and runs.
                 runTTLDays:
                   type: integer
                   exclusiveMinimum: true
                   minimum: 1
                   default: 7
                   description: How many days to keep completed Run CRs before automatic cleanup.
           required:
            - spec