apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: Project
    plural: projects
    singular: project
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .spec.phase
        - name: Workers
          type: integer
          jsonPath: .status.board.activeWorkers
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                displayName:
                  type: string
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        parentRef:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                        githubTokenSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                        sshHostKeyVerification:
                          type: string
                          enum:
                            - strict
                            - accept-new
                            - "no"
                        known_hostsSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                      required:
                        - url
                        - sshHostKeyVerification
                    local:
                      type: boolean
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    authSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                        - key
                    configMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                        - key
                model:
                  type: string
                agent:
                  type: string
                image:
                  type: string
                timeoutSeconds:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                  maximum: 9007199254740991
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                sidecars:
                  maxItems: 5
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      image:
                        type: string
                        minLength: 1
                      env:
                        maxItems: 32
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            value:
                              type: string
                          required:
                            - name
                            - value
                      ports:
                        maxItems: 8
                        type: array
                        items:
                          type: integer
                          minimum: 1
                          maximum: 65535
                      securityContext:
                        type: object
                        properties:
                          privileged:
                            type: boolean
                          runAsUser:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          runAsGroup:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          allowPrivilegeEscalation:
                            type: boolean
                    required:
                      - name
                      - image
                injectFiles:
                  maxItems: 20
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                        minLength: 1
                        maxLength: 255
                        pattern: ^[^/]+$
                      secretRef:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                        required:
                          - name
                          - key
                    required:
                      - filename
                      - secretRef
                initScript:
                  type: string
                maxParallel:
                  type: integer
                  minimum: 1
                  maximum: 20
                agents:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      model:
                        type: string
                    required:
                      - name
                phase:
                  type: string
                  enum:
                    - Active
                    - Complete
                    - Archived
                data:
                  type: object
                  properties:
                    pvcName:
                      type: string
                    mountPath:
                      type: string
                    storageClass:
                      type: string
                  required:
                    - mountPath
                gitCache:
                  type: object
                  properties:
                    worktreeReuse:
                      type: boolean
                  required:
                    - worktreeReuse
                featureBranchingEnabled:
                  type: boolean
                retryPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    maxAttempts:
                      type: integer
                      minimum: 1
                      maximum: 10
                    backoffSeconds:
                      type: integer
                      minimum: 5
                      maximum: 600
                    backoffMultiplier:
                      type: number
                      minimum: 1
                      maximum: 5
                    maxBackoffSeconds:
                      type: integer
                      minimum: 5
                      maximum: 3600
                    poisonPillThresholdSeconds:
                      type: integer
                      minimum: 0
                      maximum: 300
                  required:
                    - enabled
                    - maxAttempts
                    - backoffSeconds
                    - backoffMultiplier
                    - maxBackoffSeconds
                    - poisonPillThresholdSeconds
                reviewPolicy:
                  type: object
                  properties:
                    aiReviewerEnabled:
                      type: boolean
                    aiReviewerAgent:
                      type: string
                      maxLength: 63
                    maxAutoReworks:
                      type: integer
                      minimum: 1
                      maximum: 10
                  required:
                    - aiReviewerEnabled
                    - aiReviewerAgent
                    - maxAutoReworks
                flow:
                  type: object
                  properties:
                    preset:
                      type: string
                      enum:
                        - simple
                        - review
                        - plan-build
                        - plan-build-review-merge
                    humanApproval:
                      type: object
                      properties:
                        plan:
                          type: string
                          enum:
                            - required
                            - disabled
                        build:
                          type: string
                          enum:
                            - required
                            - disabled
                    plan:
                      type: object
                      properties:
                        onApprove:
                          type: string
                          enum:
                            - generate-builds
                            - done
                        buildGeneration:
                          type: string
                          enum:
                            - ai
                            - manual
                            - disabled
                        buildGenerationAgent:
                          type: string
                          maxLength: 63
                        defaultAgent:
                          type: string
                          maxLength: 63
                    build:
                      type: object
                      properties:
                        onSuccess:
                          type: string
                          enum:
                            - human-review
                            - ai-review
                            - done
                        onApprove:
                          type: string
                          enum:
                            - merge
                            - done
                        defaultAgent:
                          type: string
                          maxLength: 63
                    merge:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - auto
                            - manual
                            - disabled
                        agent:
                          type: string
                          maxLength: 63
                    integration:
                      type: object
                      properties:
                        mode:
                          type: string
                          enum:
                            - auto-merge
                            - manual
                            - disabled
                        agent:
                          type: string
                          maxLength: 63
                    review:
                      type: object
                      properties:
                        aiReviewerEnabled:
                          type: boolean
                        agent:
                          type: string
                          maxLength: 63
                        maxAutoReworks:
                          type: integer
                          minimum: 1
                          maximum: 10
                    retry:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        maxAttempts:
                          type: integer
                          minimum: 1
                          maximum: 10
                        backoffSeconds:
                          type: integer
                          minimum: 5
                          maximum: 600
                        backoffMultiplier:
                          type: number
                          minimum: 1
                          maximum: 5
                        maxBackoffSeconds:
                          type: integer
                          minimum: 5
                          maximum: 3600
                        poisonPillThresholdSeconds:
                          type: integer
                          minimum: 0
                          maximum: 300
                    timeouts:
                      type: object
                      properties:
                        runningStaleSeconds:
                          type: integer
                          minimum: 30
                          maximum: 86400
                        reviewStaleSeconds:
                          type: integer
                          minimum: 30
                          maximum: 86400
                        mergeStaleSeconds:
                          type: integer
                          minimum: 30
                          maximum: 86400
                        buildgenStaleSeconds:
                          type: integer
                          minimum: 30
                          maximum: 86400
                  required:
                    - preset
                codeServer:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    image:
                      type: string
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        limits:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                    packages:
                      maxItems: 50
                      type: array
                      items:
                        type: string
                  required:
                    - enabled
                    - image
                embedding:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    model:
                      type: string
                    dimensions:
                      type: integer
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                    ollamaUrl:
                      type: string
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                        limits:
                          type: object
                          x-kubernetes-preserve-unknown-fields: true
                  required:
                    - enabled
                    - model
                    - dimensions
                runner:
                  type: object
                  properties:
                    packages:
                      maxItems: 50
                      type: array
                      items:
                        type: string
                exec:
                  type: object
                  properties:
                    image:
                      type: string
              required:
                - timeoutSeconds
                - maxParallel
                - phase
                - featureBranchingEnabled
            status:
              type: object
              properties:
                board:
                  type: object
                  properties:
                    activeWorkers:
                      type: integer
                      minimum: 0
                      maximum: 9007199254740991
                    escalations:
                      type: array
                      items:
                        type: string
                    pendingQuestions:
                      type: array
                      items:
                        type: object
                        properties:
                          workerId:
                            type: string
                          sessionID:
                            type: string
                          messageText:
                            type: string
                            maxLength: 16384
                        required:
                          - workerId
                          - sessionID
                          - messageText
                    facilitations:
                      type: array
                      items:
                        type: object
                        properties:
                          diagnosis:
                            type: string
                            maxLength: 1024
                          recommendedAction:
                            type: string
                            enum:
                              - retry_same
                              - retry_alternative
                              - skip
                              - approve
                              - request_changes
                              - escalate
                          alternativeAgent:
                            type: string
                            maxLength: 63
                          suggestion:
                            type: string
                            maxLength: 4096
                        required:
                          - diagnosis
                          - recommendedAction
                    lastEventAt:
                      type: string
                    managerMetrics:
                      type: object
                      properties:
                        lastReconcileAt:
                          type: string
                        lastReconcileDurationMs:
                          type: integer
                          minimum: 0
                          maximum: 9007199254740991
                        lastReconcileResult:
                          type: string
                          enum:
                            - success
                            - error
                        lastError:
                          type: string
                        tasksPulled:
                          type: integer
                          minimum: 0
                          maximum: 9007199254740991
                        workersMonitored:
                          type: integer
                          minimum: 0
                          maximum: 9007199254740991
                        tasksReworked:
                          type: integer
                          minimum: 0
                          maximum: 9007199254740991
                      required:
                        - tasksPulled
                        - workersMonitored
                        - tasksReworked
                    suggestions:
                      type: array
                      items:
                        type: object
                        properties:
                          type:
                            type: string
                            enum:
                              - missing_tool
                              - performance
                              - reliability
                          severity:
                            type: string
                            enum:
                              - info
                              - suggestion
                              - warning
                          source:
                            type: string
                          message:
                            type: string
                          recommendation:
                            type: string
                          taskName:
                            type: string
                          createdAt:
                            type: string
                        required:
                          - type
                          - severity
                          - source
                          - message
                          - recommendation
                          - createdAt
                    findings:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          title:
                            type: string
                            maxLength: 256
                          description:
                            type: string
                            maxLength: 8192
                          severity:
                            type: string
                            enum:
                              - low
                              - medium
                              - high
                              - critical
                          category:
                            type: string
                            enum:
                              - bug
                              - security
                              - performance
                              - debt
                              - docs
                              - other
                          source:
                            type: object
                            properties:
                              project:
                                type: string
                              task:
                                type: string
                              run:
                                type: string
                              agent:
                                type: string
                            required:
                              - project
                          filePath:
                            type: string
                            maxLength: 1024
                          snippet:
                            type: string
                            maxLength: 2048
                          status:
                            type: string
                            enum:
                              - new
                              - triaged
                              - in-progress
                              - resolved
                              - duplicate
                              - wontfix
                          dedupKey:
                            type: string
                          clusterId:
                            type: string
                          duplicateOf:
                            type: string
                          taskRef:
                            type: string
                          occurrences:
                            type: integer
                            minimum: 1
                            maximum: 9007199254740991
                          createdAt:
                            type: string
                          triagedAt:
                            type: string
                        required:
                          - id
                          - title
                          - description
                          - severity
                          - category
                          - source
                          - status
                          - dedupKey
                          - occurrences
                          - createdAt
                  required:
                    - activeWorkers
          required:
            - spec
