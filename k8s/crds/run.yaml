apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runs.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: Run
    plural: runs
    singular: run
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                project:
                  type: string
                  minLength: 1
                boardTask:
                  type: string
                task:
                  type: string
                  minLength: 1
                interactive:
                  type: boolean
                agent:
                  type: string
                agents:
                  maxItems: 10
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      model:
                        type: string
                    required:
                      - name
                facilitation:
                  type: object
                  properties:
                    targetRunName:
                      type: string
                      minLength: 1
                    targetTaskId:
                      type: string
                      minLength: 1
                    failureReason:
                      type: string
                      maxLength: 8192
                    sessionSummary:
                      type: string
                      maxLength: 32768
                    successReview:
                      type: boolean
                  required:
                    - targetRunName
                    - targetTaskId
                    - failureReason
                    - sessionSummary
                    - successReview
                runContext:
                  type: string
                  enum:
                    - plan-worker
                    - build-worker
                    - review-facilitator
                    - merge-worker
                    - facilitator
                inlineAgents:
                  maxItems: 5
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      content:
                        type: string
                        maxLength: 102400
                    required:
                      - name
                      - content
                model:
                  type: string
                image:
                  type: string
                dispatcher:
                  type: object
                  properties:
                    image:
                      type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    authSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                        - key
                    configMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                        - key
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        parentRef:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                        githubTokenSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                        sshHostKeyVerification:
                          type: string
                          enum:
                            - strict
                            - accept-new
                            - "no"
                        known_hostsSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                            - key
                      required:
                        - url
                        - sshHostKeyVerification
                    local:
                      type: boolean
                sidecars:
                  maxItems: 5
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      image:
                        type: string
                        minLength: 1
                      env:
                        maxItems: 32
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            value:
                              type: string
                          required:
                            - name
                            - value
                      ports:
                        maxItems: 8
                        type: array
                        items:
                          type: integer
                          minimum: 1
                          maximum: 65535
                      securityContext:
                        type: object
                        properties:
                          privileged:
                            type: boolean
                          runAsUser:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          runAsGroup:
                            type: integer
                            minimum: -9007199254740991
                            maximum: 9007199254740991
                          allowPrivilegeEscalation:
                            type: boolean
                    required:
                      - name
                      - image
                injectFiles:
                  maxItems: 20
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                        minLength: 1
                        maxLength: 255
                        pattern: ^[^/]+$
                      secretRef:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                        required:
                          - name
                          - key
                    required:
                      - filename
                      - secretRef
                initScript:
                  type: string
                timeoutSeconds:
                  type: integer
                  minimum: 0
                  exclusiveMinimum: true
                  maximum: 9007199254740991
                ttlSecondsAfterFinished:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                expose:
                  type: object
                  properties:
                    web:
                      type: boolean
                data:
                  type: object
                  properties:
                    pvcName:
                      type: string
                    mountPath:
                      type: string
                    storageClass:
                      type: string
                  required:
                    - mountPath
                gitCache:
                  type: object
                  properties:
                    worktreeReuse:
                      type: boolean
                  required:
                    - worktreeReuse
                runner:
                  type: object
                  properties:
                    packages:
                      maxItems: 50
                      type: array
                      items:
                        type: string
              required:
                - project
                - interactive
                - image
                - timeoutSeconds
                - ttlSecondsAfterFinished
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Initializing
                    - Running
                    - WaitingForInput
                    - Succeeded
                    - Failed
                    - Cancelled
                message:
                  type: string
                podPhase:
                  type: string
                  enum:
                    - Pending
                    - Running
                    - Succeeded
                    - Failed
                    - Unknown
                podName:
                  type: string
                serviceName:
                  type: string
                sessionID:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                lastEventAt:
                  type: string
                tokensIn:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                tokensOut:
                  type: integer
                  minimum: 0
                  maximum: 9007199254740991
                webURL:
                  type: string
                ingressName:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                    required:
                      - type
                      - status
                containerExitCodes:
                  type: array
                  items:
                    type: object
                    properties:
                      container:
                        type: string
                      exitCode:
                        type: integer
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                      reason:
                        type: string
                      message:
                        type: string
                    required:
                      - container
                      - exitCode
          required:
            - spec
