apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: runs.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: Run
    plural: runs
    singular: run
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                project:
                  type: string
                  minLength: 1
                boardTask:
                  type: string
                task:
                  type: string
                  minLength: 1
                interactive:
                  type: boolean
                agent:
                  type: string
                agents:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                    required:
                      - name
                  maxItems: 10
                facilitation:
                  type: object
                  properties:
                    targetRunName:
                      type: string
                      minLength: 1
                    targetTaskId:
                      type: string
                      minLength: 1
                    failureReason:
                      type: string
                      maxLength: 8192
                    sessionSummary:
                      type: string
                      maxLength: 32768
                    successReview:
                      type: boolean
                  required:
                    - targetRunName
                    - targetTaskId
                    - failureReason
                    - sessionSummary
                inlineAgents:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      content:
                        type: string
                        maxLength: 102400
                    required:
                      - name
                      - content
                  maxItems: 5
                model:
                  type: string
                image:
                  type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    limits:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                secrets:
                  type: object
                  properties:
                    llmKeysSecret:
                      type: string
                    authSecret:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                    configMap:
                      type: object
                      properties:
                        name:
                          type: string
                          minLength: 1
                        key:
                          type: string
                      required:
                        - name
                source:
                  type: object
                  properties:
                    git:
                      type: object
                      properties:
                        url:
                          type: string
                          minLength: 1
                        ref:
                          type: string
                        parentRef:
                          type: string
                        sshSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        githubTokenSecret:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            key:
                              type: string
                          required:
                            - name
                        author:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            email:
                              type: string
                              minLength: 1
                          required:
                            - name
                            - email
                      required:
                        - url
                    local:
                      type: boolean
                sidecars:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        minLength: 1
                        maxLength: 63
                      image:
                        type: string
                        minLength: 1
                      env:
                        type: array
                        items:
                          type: object
                          properties:
                            name:
                              type: string
                              minLength: 1
                            value:
                              type: string
                          required:
                            - name
                            - value
                        maxItems: 32
                      ports:
                        type: array
                        items:
                          type: integer
                          minimum: 1
                          maximum: 65535
                        maxItems: 8
                      securityContext:
                        type: object
                        properties:
                          privileged:
                            type: boolean
                          runAsUser:
                            type: integer
                          runAsGroup:
                            type: integer
                          allowPrivilegeEscalation:
                            type: boolean
                    required:
                      - name
                      - image
                  maxItems: 5
                injectFiles:
                  type: array
                  items:
                    type: object
                    properties:
                      filename:
                        type: string
                        minLength: 1
                        maxLength: 255
                        pattern: ^[^/]+$
                      secretRef:
                        type: object
                        properties:
                          name:
                            type: string
                            minLength: 1
                          key:
                            type: string
                        required:
                          - name
                    required:
                      - filename
                      - secretRef
                  maxItems: 20
                initScript:
                  type: string
                timeoutSeconds:
                  type: integer
                  exclusiveMinimum: true
                  minimum: 0
                ttlSecondsAfterFinished:
                  type: integer
                  minimum: 0
                expose:
                  type: object
                  properties:
                    web:
                      type: boolean
                data:
                  type: object
                  properties:
                    pvcName:
                      type: string
                    mountPath:
                      type: string
                    storageClass:
                      type: string
                gitCache:
                  type: object
                  properties:
                    worktreeReuse:
                      type: boolean
                runner:
                  type: object
                  properties:
                    packages:
                      type: array
                      items:
                        type: string
                      maxItems: 50
              required:
                - project
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Initializing
                    - Running
                    - WaitingForInput
                    - Succeeded
                    - Failed
                    - Cancelled
                message:
                  type: string
                podName:
                  type: string
                serviceName:
                  type: string
                sessionID:
                  type: string
                startedAt:
                  type: string
                completedAt:
                  type: string
                lastEventAt:
                  type: string
                tokensIn:
                  type: integer
                  minimum: 0
                tokensOut:
                  type: integer
                  minimum: 0
                webURL:
                  type: string
                ingressName:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                    required:
                      - type
                      - status
          required:
            - spec
