apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tasks.percussionist.dev
spec:
  group: percussionist.dev
  names:
    kind: Task
    plural: tasks
    singular: task
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Column
          type: string
          jsonPath: .status.column
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Project
          type: string
          jsonPath: .spec.projectRef
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              properties:
                projectRef:
                  type: string
                  minLength: 1
                type:
                  type: string
                  enum:
                    - PLAN
                    - BUILD
                title:
                  type: string
                  minLength: 1
                  maxLength: 256
                description:
                  type: string
                  maxLength: 8192
                priority:
                  type: string
                  enum:
                    - high
                    - medium
                    - low
                agent:
                  type: string
                  minLength: 1
                parentTaskRef:
                  type: string
                predecessorRef:
                  type: string
                successorRef:
                  type: string
                retryPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    maxAttempts:
                      type: integer
                      minimum: 1
                      maximum: 10
                    backoffSeconds:
                      type: integer
                      minimum: 5
                      maximum: 600
              required:
                - projectRef
                - type
                - title
                - priority
                - agent
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - idea
                    - pending
                    - scheduled
                    - initializing
                    - running
                    - waiting-for-input
                    - succeeded
                    - reviewing
                    - awaiting-human
                    - awaiting-merge
                    - rework-requested
                    - generating-builds
                    - awaiting-children
                    - awaiting-feature-merge
                    - done
                    - failed
                blocked:
                  type: boolean
                blockedReason:
                  type: string
                  maxLength: 1024
                retryAfter:
                  type: string
                lastFailureReason:
                  type: string
                  maxLength: 4096
                lastFailureDuration:
                  type: number
                column:
                  type: string
                  enum:
                    - backlog
                    - ready
                    - in-progress
                    - review
                    - rework
                    - done
                    - blocked
                worker:
                  type: object
                  properties:
                    runName:
                      type: string
                    status:
                      type: string
                      enum:
                        - Running
                        - Succeeded
                        - Failed
                        - Escalated
                    branch:
                      type: string
                    gitBranch:
                      type: string
                    parentBranch:
                      type: string
                    mergeIntoBranch:
                      type: string
                    prNumber:
                      type: integer
                      minimum: 1
                      maximum: 9007199254740991
                    startedAt:
                      type: string
                    completedAt:
                      type: string
                    retryCount:
                      type: integer
                      minimum: 0
                      maximum: 9007199254740991
                    aiReworkCount:
                      type: integer
                      minimum: 0
                      maximum: 9007199254740991
                    reviewRunName:
                      type: string
                    buildTasksFacilitatorRun:
                      type: string
                    buildTasksCreated:
                      type: boolean
                    createdBuildTaskRefs:
                      type: array
                      items:
                        type: string
                    reviewApproved:
                      type: boolean
                    reviewFeedback:
                      type: string
                      maxLength: 4096
                    mergeRunName:
                      type: string
                    mergedAt:
                      type: string
                    mergeError:
                      type: string
                      maxLength: 4096
                  required:
                    - status
                    - retryCount
                    - aiReworkCount
                reviews:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                        enum:
                          - approve
                          - request_changes
                          - escalate
                      diagnosis:
                        type: string
                        maxLength: 1024
                      feedback:
                        type: string
                        maxLength: 4096
                      reviewRunName:
                        type: string
                      reviewedAt:
                        type: string
                      attempt:
                        type: integer
                        minimum: 0
                        maximum: 9007199254740991
                    required:
                      - action
                      - reviewedAt
                diffFindings:
                  type: object
                  properties:
                    version:
                      type: number
                      enum:
                        - 1
                    context:
                      type: object
                      properties:
                        baseSha:
                          type: string
                          minLength: 1
                        headSha:
                          type: string
                          minLength: 1
                        forkSha:
                          type: string
                          minLength: 1
                        diffFingerprint:
                          type: string
                          minLength: 1
                      required:
                        - baseSha
                        - headSha
                        - forkSha
                        - diffFingerprint
                    items:
                      maxItems: 25
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                            minLength: 1
                          source:
                            type: string
                            enum:
                              - reviewer
                          severity:
                            type: string
                            enum:
                              - critical
                              - high
                              - medium
                              - low
                              - info
                          score:
                            type: number
                            minimum: 0
                            maximum: 100
                          title:
                            type: string
                            minLength: 1
                            maxLength: 160
                          comment:
                            type: string
                            minLength: 1
                            maxLength: 2000
                          category:
                            type: string
                            maxLength: 64
                          anchors:
                            minItems: 1
                            maxItems: 3
                            type: array
                            items:
                              type: object
                              properties:
                                path:
                                  type: string
                                  minLength: 1
                                side:
                                  type: string
                                  enum:
                                    - old
                                    - new
                                line:
                                  type: integer
                                  minimum: 1
                                  maximum: 9007199254740991
                                endLine:
                                  type: integer
                                  minimum: 1
                                  maximum: 9007199254740991
                                hunkHeader:
                                  type: string
                                  maxLength: 256
                              required:
                                - path
                                - side
                                - line
                          context:
                            type: object
                            properties:
                              baseSha:
                                type: string
                                minLength: 1
                              headSha:
                                type: string
                                minLength: 1
                              forkSha:
                                type: string
                                minLength: 1
                              diffFingerprint:
                                type: string
                                minLength: 1
                            required:
                              - baseSha
                              - headSha
                              - forkSha
                              - diffFingerprint
                          createdAt:
                            type: string
                            minLength: 1
                          authorRunName:
                            type: string
                        required:
                          - id
                          - source
                          - severity
                          - title
                          - comment
                          - anchors
                          - context
                          - createdAt
                    updatedAt:
                      type: string
                      minLength: 1
                    sourceRunName:
                      type: string
                      minLength: 1
                  required:
                    - version
                    - context
                    - items
                    - updatedAt
                    - sourceRunName
          required:
            - spec
