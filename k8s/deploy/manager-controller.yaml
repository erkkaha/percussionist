# RBAC and Deployment for the percussionist manager controller.
#
# The manager watches OpenCodeKanban CRs and dispatches worker runs.
# It is persistent (single replica) and runs continuously during active sprints.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: percussionist-manager
  namespace: percussionist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percussionist-manager
rules:
  # Watch and patch Project CRs (the boards the manager orchestrates).
  - apiGroups: ["percussionist.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["percussionist.dev"]
    resources: ["projects/status"]
    verbs: ["get", "update", "patch"]
  # Create and monitor Run worker pods (child resources).
  - apiGroups: ["percussionist.dev"]
    resources: ["runs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["percussionist.dev"]
    resources: ["runs/status"]
    verbs: ["get", "update", "patch"]
  # Task — first-class task CRs; manager owns their lifecycle.
  - apiGroups: ["percussionist.dev"]
    resources: ["tasks"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: ["percussionist.dev"]
    resources: ["tasks/status"]
    verbs: ["get", "update", "patch"]
  # ClusterAgent — read-only (for agent definitions).
  # ClusterSettings — read-only (for resolving runner resource defaults).
  - apiGroups: ["percussionist.dev"]
    resources: ["clusteragents", "clustersettings"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps — read session snapshots saved by the dispatcher for facilitation;
  # also write chat history (manager-chat-history).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
  # Pod logs and events — for the agent's diagnostic MCP tools.
  # Pod creation — for execInWorkspace (used by read_plan and other maintenance tools).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
# ClusterIP Service exposing the manager's chat handler (port 4098)
# so the web dashboard can proxy interactive conversations.
apiVersion: v1
kind: Service
metadata:
  name: percussionist-manager
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: manager
spec:
  selector:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: manager
  ports:
    - name: chat
      port: 4098
      targetPort: 4098
      protocol: TCP
    - name: mcp
      port: 4097
      targetPort: 4097
      protocol: TCP
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: percussionist-manager
subjects:
  - kind: ServiceAccount
    name: percussionist-manager
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: percussionist-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: percussionist-manager
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: manager
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: manager
    spec:
      serviceAccountName: percussionist-manager
      containers:
        - name: manager
          image: percussionist/manager:dev
          imagePullPolicy: Never
          env:
            - name: WATCH_NAMESPACE
              value: percussionist
            - name: PERCUSSIONIST_NAMESPACE
              value: percussionist
            - name: WEB_SERVICE_URL
              value: http://percussionist-web.percussionist.svc.cluster.local:8080
            - name: RUNNER_IMAGE_DEFAULT
              value: percussionist/runner:dev
            - name: MERGING_AGENT
              value: meta-integrator
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pgrep -f node >/dev/null"]
            initialDelaySeconds: 2
            periodSeconds: 5

        # opencode-web sidecar — runs the agent session for decision-making
        # and interactive chat. The manager connects to it via localhost:4096.
        - name: opencode-web
          image: ghcr.io/anomalyco/opencode:1.15.6
          imagePullPolicy: IfNotPresent
          args: ["web", "--hostname", "0.0.0.0", "--port", "4096"]
          env:
            - name: OPENCODE_CONFIG_CONTENT
              valueFrom:
                configMapKeyRef:
                  name: agent-config
                  key: opencode.json
            - name: HOME
              value: /root
            - name: OPENCODE_AUTH_CONTENT
              valueFrom:
                secretKeyRef:
                  name: opencode-auth
                  key: auth.json
          envFrom:
            - secretRef:
                name: llm-keys
                optional: true
          ports:
            - containerPort: 4096
              name: opencode
              protocol: TCP
          volumeMounts:
            - name: agent-skills
              mountPath: /root/.config/opencode/agents/
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            tcpSocket:
              port: 4096
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: agent-skills
          configMap:
            name: agent-config
            items:
              - key: manager-decision.md
                path: manager-decision.md
