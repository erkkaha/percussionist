# Ollama deployment for the memory service embedding provider.
#
# The memory service calls Ollama's /api/embeddings endpoint to generate vector
# embeddings for semantic search and context retrieval.
#
# Model warmup is handled per-project by the memory service at startup.
# The memory service pulls the model declared in spec.embedding.model
# when it starts, so no global init preload is required.
#
# Memory services discover Ollama via cluster DNS at http://ollama.percussionist.svc.cluster.local:11434
# Override per-project via spec.embedding.ollamaUrl.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: http
              protocol: TCP
          resources:
            requests: { cpu: "1", memory: "4Gi" }
            limits:   { cpu: "4", memory: "8Gi" }
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
spec:
  selector:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
