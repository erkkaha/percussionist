# Ollama deployment for the memory service embedding provider.
#
# The memory service calls Ollama's /api/embeddings endpoint to generate vector
# embeddings for semantic search and context retrieval.
#
# An init container pre-pulls nomic-embed-text on startup so the model is
# available before any memory service begins requesting embeddings.  Manual
# `ollama pull` is no longer required as a prerequisite.
#
# Memory services discover Ollama via cluster DNS at http://ollama.percussionist.svc.cluster.local:11434
# Override per-project via spec.embedding.ollamaUrl.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: ollama
    spec:
      initContainers:
        - name: pull-embedding-model
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "ollama pull nomic-embed-text"]
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { memory: "2Gi" }
      containers:
        - name: ollama
          image: ollama/ollama:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 11434
              name: http
              protocol: TCP
          resources:
            requests: { cpu: "1", memory: "4Gi" }
            limits:   { cpu: "4", memory: "8Gi" }
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
spec:
  selector:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: ollama
  ports:
    - name: http
      port: 11434
      targetPort: 11434
      protocol: TCP
