# RBAC and operator Deployment for the percussionist operator.
#
# Layout:
#   - Namespace:         percussionist
#   - ServiceAccounts:
#       percussionist-operator   : used by the operator Deployment
#       percussionist-dispatcher : used by the dispatcher sidecar in every run pod
#   - ClusterRole "percussionist-operator":
#       full rights on our CRD + rights to create pods/services/secrets in
#       any namespace we watch. (M2 watches a single namespace but the
#       permissions model stays cluster-wide for simplicity.)
#   - Role "percussionist-dispatcher":
#       patch status on Run resources in its own namespace only.
---
apiVersion: v1
kind: Namespace
metadata:
  name: percussionist
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: percussionist-operator
  namespace: percussionist
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: percussionist-dispatcher
  namespace: percussionist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percussionist-operator
rules:
  - apiGroups: ["percussionist.dev"]
    resources: ["runs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["percussionist.dev"]
    resources: ["runs/status"]
    verbs: ["get", "update", "patch"]
  # Read Project CRs to get project UID for cache PVC owner references.
  # list+watch required for the project informer (code-server reconciliation).
  - apiGroups: ["percussionist.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch"]
  # Child resources the operator creates per run.
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Secrets — read web-auth token for passing to dispatcher pods.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments for per-project code-server.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # ClusterAgent — read-only catalog watched by the operator.
  - apiGroups: ["percussionist.dev"]
    resources: ["clusteragents"]
    verbs: ["get", "list", "watch"]
  # ClusterSettings — global defaults read by the operator.
  - apiGroups: ["percussionist.dev"]
    resources: ["clustersettings"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps for inline agent injection (per-run).
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: percussionist-operator
subjects:
  - kind: ServiceAccount
    name: percussionist-operator
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: percussionist-operator
---
# Dispatcher SA: can read its own CR and patch status. Scoped per-namespace
# because each run pod only needs to touch resources in its own namespace.
# We create the Role in the operator namespace; for M2 the dispatcher runs
# there too. If runs target other namespaces later the operator should
# propagate this Role via a per-namespace reconciler.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: percussionist-dispatcher
  namespace: percussionist
rules:
  - apiGroups: ["percussionist.dev"]
    resources: ["runs"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["percussionist.dev"]
    resources: ["runs/status"]
    verbs: ["get", "update", "patch"]
  # Session snapshot: dispatcher writes a ConfigMap with the full conversation
  # before exiting so the web dashboard can display it after the pod dies.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch"]
  # create_task tool: dispatcher reads project to validate agent roster, then
  # creates a Task CR and patches its status to set initial phase.
  - apiGroups: ["percussionist.dev"]
    resources: ["projects"]
    verbs: ["get"]
  - apiGroups: ["percussionist.dev"]
    resources: ["tasks", "tasks/status"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: percussionist-dispatcher
  namespace: percussionist
subjects:
  - kind: ServiceAccount
    name: percussionist-dispatcher
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: percussionist-dispatcher
---
# Cluster-scope permissions for the dispatcher: create_task validates the
# selected agent's capabilities by listing ClusterAgent CRs (cluster-scoped).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percussionist-dispatcher
rules:
  - apiGroups: ["percussionist.dev"]
    resources: ["clusteragents"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: percussionist-dispatcher
subjects:
  - kind: ServiceAccount
    name: percussionist-dispatcher
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: percussionist-dispatcher
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: percussionist-operator
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  # Single-replica for M2. No leader election yet.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: percussionist-operator
      containers:
        - name: operator
          image: ghcr.io/erkkaha/percussionist/operator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: WATCH_NAMESPACE
              value: percussionist
            - name: RUNNER_IMAGE_DEFAULT
              value: ghcr.io/erkkaha/percussionist/runner:latest
            - name: DISPATCHER_IMAGE
              value: ghcr.io/erkkaha/percussionist/dispatcher:latest
            - name: DISPATCHER_SERVICE_ACCOUNT
              value: percussionist-dispatcher
            # Storage defaults — controls data PVC creation.
            # DEFAULT_STORAGE_CLASS:
            #   "standard" works on minikube (hostPath). Override to "longhorn-rwx" on RWX clusters.
            - name: DEFAULT_STORAGE_CLASS
              value: "standard"
            # DEFAULT_STORAGE_ACCESS_MODE:
            #   "ReadWriteOnce" is minikube-safe. Override to "ReadWriteMany" for parallel workers.
            - name: DEFAULT_STORAGE_ACCESS_MODE
              value: "ReadWriteOnce"
            - name: DEFAULT_STORAGE_SIZE
              value: "50Gi"
            # Enable per-run Ingresses that expose the opencode web UI at
            # <run-name>.<baseURL-without-scheme>/.
            # Format: scheme://host[:port]  (no trailing slash)
            #
            # Examples:
            #   Port-80 cluster (*.percussionist.localhost resolves to 127.0.0.1):
            #     http://percussionist.localhost
            #   minikube with nip.io wildcard DNS (port 30080 = nginx-ingress NodePort):
            #     PERCUSSIONIST_INGRESS_BASE_URL=http://$(minikube ip).nip.io:30080
            - name: PERCUSSIONIST_INGRESS_BASE_URL
              value: http://192.168.49.2.nip.io:30080
            - name: PERCUSSIONIST_INGRESS_CLASS
              value: nginx
            - name: PERCUSSIONIST_SELF_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WEB_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: web-auth
                  key: token
                  optional: true
            # - name: PERCUSSIONIST_INGRESS_CLASS
            #   value: nginx
            # - name: PERCUSSIONIST_INGRESS_ANNOTATIONS
            #   value: '{"nginx.ingress.kubernetes.io/proxy-read-timeout":"3600","nginx.ingress.kubernetes.io/proxy-buffering":"off"}'
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          readinessProbe:
            # The operator has no HTTP surface yet; use an exec probe on a
            # sentinel file the process could touch later. For now simply
            # check that the process is alive via a tiny `node -e`.
            exec:
              command: ["sh", "-c", "pgrep -f node >/dev/null"]
            initialDelaySeconds: 2
            periodSeconds: 5
