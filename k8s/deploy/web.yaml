# RBAC, Service, Deployment, and PVC for the percussionist web dashboard.
#
# The web server reads Run resources and pod logs, and also hosts
# the stats SQLite database (bun:sqlite) on a PersistentVolumeClaim.
# Dispatcher sidecars POST session data to /api/stats/session after each run.
#
# Stats configuration (env vars on the Deployment):
#   DATA_DIR        — path where percussionist.db is stored (default: /app/data)
#   RETENTION_DAYS  — delete sessions older than N days (default: 30; 0=forever)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: percussionist-web-db
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: percussionist-web
  namespace: percussionist
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: percussionist-web
  namespace: percussionist
rules:
  # Read + write Run resources (list, detail, create, delete).
  - apiGroups: ["percussionist.dev"]
    resources: ["runs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # Read + write Project resources (list, detail, create, update, delete).
  - apiGroups: ["percussionist.dev"]
    resources: ["projects"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Patch Project status subresource (for board status updates from UI).
  - apiGroups: ["percussionist.dev"]
    resources: ["projects/status"]
    verbs: ["get", "patch"]
  # Read + write Task resources (board task CRs).
  - apiGroups: ["percussionist.dev"]
    resources: ["tasks"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Patch Task status subresource.
  - apiGroups: ["percussionist.dev"]
    resources: ["tasks/status"]
    verbs: ["get", "patch"]
  # Read pods (needed to resolve podName and read logs).
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  # Read pod metrics (for observability view).
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  # Read + write secrets (get for auth; create/update/patch/delete for inject-file secrets).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
  # Read session snapshot ConfigMaps (fallback when live proxy is unavailable).
  # create/update/delete for per-project opencode config configmaps.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: percussionist-web
  namespace: percussionist
subjects:
  - kind: ServiceAccount
    name: percussionist-web
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: percussionist-web
---
# ClusterRole for cluster-scoped resources (ClusterAgents).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percussionist-web-clusteragents
rules:
  - apiGroups: ["percussionist.dev"]
    resources: ["clusteragents"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
---
# ClusterRole for node metrics (observability view).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: percussionist-web-nodemetrics
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: percussionist-web-clusteragents
subjects:
  - kind: ServiceAccount
    name: percussionist-web
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: percussionist-web-clusteragents
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: percussionist-web-nodemetrics
subjects:
  - kind: ServiceAccount
    name: percussionist-web
    namespace: percussionist
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: percussionist-web-nodemetrics
---
apiVersion: v1
kind: Service
metadata:
  name: percussionist-web
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: percussionist-web
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: percussionist
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: percussionist
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: percussionist-web
      containers:
        - name: web
          image: percussionist/web:dev
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: WATCH_NAMESPACE
              value: percussionist
            - name: PORT
              value: "8080"
            - name: DATA_DIR
              value: /app/data
            # Number of days to retain session stats (0 = keep forever).
            - name: RETENTION_DAYS
              value: "30"
            # Bun's TLS stack does not pick up the in-cluster CA from the
            # @kubernetes/client-node https.Agent. Point it at the service
            # account CA bundle explicitly so Bun trusts the API server cert.
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - name: percussionist-db
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15

        - name: tailscale
          image: tailscale/tailscale:latest
          imagePullPolicy: Always
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: key
            - name: TS_HOSTNAME
              value: percussionist-web
            - name: TS_KUBE_SECRET
              value: tailscale-state-web
            - name: TS_USERSPACE
              value: "true"
            - name: TS_EXTRA_ARGS
              value: "--accept-dns=false"
          command:
            - /bin/sh
            - -c
            - |
              /usr/local/bin/tailscaled --tun=userspace-networking &
              sleep 3
              tailscale up --authkey=${TS_AUTHKEY} --hostname=${TS_HOSTNAME} --accept-dns=false
              echo "Waiting for Tailscale IP..."
              for i in $(seq 1 30); do
                IP=$(tailscale ip -4 2>/dev/null) && [ -n "$IP" ] && break
                sleep 2
              done
              echo "Tailscale IP: $IP"
              tailscale serve --https=443 http://127.0.0.1:8080 && echo "HTTPS serve enabled"
              wait
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
      volumes:
        - name: percussionist-db
          persistentVolumeClaim:
            claimName: percussionist-web-db
---
# Dashboard Ingress — exposes the Percussionist web UI at a stable URL without
# kubectl port-forward. Relies on the ingress-nginx addon (or any nginx-class
# ingress controller) and the traefik.me wildcard DNS that maps
# *.192.168.49.2.traefik.me → 192.168.49.2 (default minikube IP).
#
# With the ingress-nginx HTTP NodePort pinned to 30080 (see scripts/minikube-load.sh),
# the dashboard is reachable at:
#   http://app.192.168.49.2.traefik.me:30080/
#
# For other cluster setups, replace the host value with the appropriate base
# domain, e.g. app.percussionist.localhost (requires ingress controller on 127.0.0.1:80).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: percussionist-web
  namespace: percussionist
  labels:
    app.kubernetes.io/name: percussionist
    app.kubernetes.io/component: web
spec:
  ingressClassName: nginx
  rules:
    - host: app.192.168.49.2.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: percussionist-web
                port:
                  number: 8080
