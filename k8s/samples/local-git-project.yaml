# Sample Project with local git workspace (no remote).
#
# Use when you want agents to work on files that don't have a remote git
# remote — e.g. a scratch workspace, generated code, or internal documents.
#
# The workspace is initialised with `git init` on the first run and then
# persisted in the project data PVC at /data/workspace/ so subsequent runs
# pick up where the previous agent left off.
#
# Apply:
#   kubectl apply -f k8s/samples/local-git-project.yaml
apiVersion: percussionist.dev/v1alpha1
kind: Project
metadata:
  name: local-workspace
  namespace: percussionist
spec:
  displayName: Local Workspace

  # Local git — no remote URL required.
  # The workspace lives at /data/workspace/ inside the data PVC.
  source:
    local: true

  model: github-copilot/claude-sonnet-4.5

  secrets:
    llmKeysSecret: llm-keys
    opencodeAuthSecret:
      name: opencode-auth

  # Optional: customise the data PVC name or storage class.
  # data:
  #   pvcName: local-workspace-data   # default: {project}-data
  #   storageClass: nfs-client        # default: cluster default
