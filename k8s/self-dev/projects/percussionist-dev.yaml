# percussionist-dev project.
#
# Uses remote git with the mirror/worktree workflow. Agents push to
# agent/<task-name> branches; integrator merges to main.
#
# Prerequisites (see secrets/README.md):
#   kubectl get secret git-ssh-key git-github-token opencode-auth -n percussionist
#
# Apply:
#   kubectl apply -f k8s/self-dev/projects/percussionist-dev.yaml
apiVersion: percussionist.dev/v1alpha1
kind: Project
metadata:
  name: percussionist-dev
  namespace: percussionist
  labels:
    percussionist.dev/project-type: self-development
spec:
  displayName: "Percussionist"

  source:
    git:
      url: git@github.com:erkkaha/percussionist.git
      ref: main
      sshSecret:
        name: git-ssh-key
        key: ssh-privatekey
      # githubTokenSecret — add when integrator is ready to push PRs.
      # Create secret first: beatctl github-token create --token ghp_xxx -n percussionist
      author:
        name: "Percussionist Agent"
        email: "agent@percussionist.dev"

  agents:
    - name: planner
      model: lmstudio/qwen3.6-35b-a3b@q4_k_s
    - name: builder
      model: lmstudio/qwen3.6-35b-a3b@q4_k_s


  # Single worker — increase when RWX storage is available.
  maxParallel: 1

  model: lmstudio/qwen3.6-35b-a3b@q4_k_s

  secrets:
    authSecret:
      name: opencode-auth

  # 2 hours — enough time for image builds and e2e smoke tests.
  timeoutSeconds: 7200

  # DinD sidecar — available to all tasks for Docker image builds.
  # Builder and planner tasks simply ignore the idle Docker daemon.
  # Privileged mode is required for DinD to load kernel modules, mount special
  # filesystems, and create network interfaces.
  sidecars:
    - name: docker
      image: docker:24-dind
      ports:
        - 2375
      env:
        - name: DOCKER_TLS_CERTDIR
          value: ""
      securityContext:
        privileged: true

  # Larger PVC: git mirrors + pnpm store + Docker layer cache.
  data:
    storageClass: longhorn-rwx

  # Use a richer image for maintenance/exec pods (e.g. exec_in_workspace).
  # Falls back to alpine/git:v2.54.0 when unset.
  exec:
    image: ubuntu:24.04

  # Pre-warm pnpm store on startup so agent's pnpm install finishes within
  # the 120s bash tool timeout. Cache persists on the data PVC across runs.
  initScript: |
    echo "[init] warming pnpm store"
    CI=true pnpm install --frozen-lockfile --config.strict-dep-builds=false 2>&1 || echo "[init] pnpm install skipped"
    echo "[init] pruning pnpm store"
    CI=true pnpm store prune 2>&1 || echo "[init] pnpm store prune skipped"
    echo "[init] init complete"

  # Feature branching: each task works on its own branch to prevent
  # git mirror fetch conflicts when multiple tasks run in parallel.
  featureBranchingEnabled: true
