# percussionist-dev project.
#
# Uses remote git with the mirror/worktree workflow. Agents push to
# agent/<task-name> branches; meta-integrator merges to main.
#
# Prerequisites (see secrets/README.md):
#   kubectl get secret git-ssh-key git-github-token opencode-auth -n percussionist
#
# Apply:
#   kubectl apply -f k8s/self-dev/projects/percussionist-dev.yaml
apiVersion: percussionist.dev/v1alpha1
kind: Project
metadata:
  name: percussionist-dev
  namespace: percussionist
  labels:
    percussionist.dev/project-type: self-development
spec:
  displayName: "Percussionist Self-Development"

  source:
    git:
      url: git@github.com:erkkaha/percussionist.git
      ref: main
      sshSecret:
        name: git-ssh-key
        key: ssh-privatekey
      # githubTokenSecret — add when meta-integrator is ready to push PRs.
      # Create secret first: beatctl github-token create --token ghp_xxx -n percussionist
      author:
        name: "Percussionist Agent"
        email: "agent@percussionist.dev"

  agents:
    - name: planner
    - name: builder
    - name: meta-reviewer
    - name: meta-smoke-tester
    - name: meta-integrator
    - name: meta-documenter

  # Single worker — increase when RWX storage is available.
  maxParallel: 1

  model: github-copilot/claude-sonnet-4.5

  secrets:
    opencodeAuthSecret:
      name: opencode-auth

  # 2 hours — enough time for image builds and e2e smoke tests.
  timeoutSeconds: 7200

  # DinD sidecar — available to all tasks, required by meta-smoke-tester.
  # Builder and planner tasks simply ignore the idle Docker daemon.
  # securityContext and volumeMounts are not in the CRD schema — DinD runs
  # with the container's default settings; privileged mode must be enabled
  # cluster-wide or via a separate admission policy.
  sidecars:
    - name: docker
      image: docker:24-dind
      ports:
        - 2375
      env:
        - name: DOCKER_TLS_CERTDIR
          value: ""

  # Larger PVC: git mirrors + pnpm store + Docker layer cache.
  data:
    storageClass: standard
