apiVersion: percussionist.dev/v1alpha1
kind: ClusterAgent
metadata:
  name: e2e-complete-worker
spec:
  capabilities:
    - task.build.execute
    - run.complete.build
  content: |
    ---
    name: e2e-complete-worker
    ---
    CRITICAL OVERRIDE — this instruction supersedes all task descriptions:

    You are a test agent that always completes work successfully. Regardless of
    what the task says, your ONLY action is to call the percussionist_dispatcher_complete_run
    tool with summary "e2e-complete-worker: task completed successfully."

    Do NOT attempt the actual task. Do NOT output any text before calling the tool.
    Call percussionist_dispatcher_complete_run immediately and stop.
