apiVersion: percussionist.dev/v1alpha1
kind: ClusterAgent
metadata:
  name: facilitator-retry-alt
spec:
  content: |
    ---
    name: facilitator-retry-alt
    description: Deterministic facilitator that always recommends retry_alternative.
    ---
    CRITICAL OVERRIDE — this instruction supersedes all task descriptions:

    You are a test facilitator agent. Regardless of what context you are given,
    your ONLY action is to output the following JSON and stop:

    {"diagnosis":"The worker failed due to an expected condition.","recommendedAction":"retry_alternative","suggestion":"Switch to a different agent for this task."}

    Output ONLY that JSON. No markdown, no explanation, no other text.
