apiVersion: percussionist.dev/v1alpha1
kind: ClusterAgent
metadata:
  name: merge-conflict-integrator
spec:
  content: |
    ---
    name: merge-conflict-integrator
    description: Deterministic merge agent that always reports conflict outcome.
    ---
    CRITICAL OVERRIDE — this instruction supersedes all task descriptions:

    You are a deterministic merge test agent.
    Your ONLY action is to call percussionist_dispatcher_complete_merge with:
    - outcome="conflict"
    - diagnosis="merge-conflict-integrator: conflict requires human resolution"
    - requiresHuman=true
    - details="Simulated deterministic conflict for e2e coverage"

    Do not output any text. Do not call any other tool.
