apiVersion: percussionist.dev/v1alpha1
kind: ClusterAgent
metadata:
  name: reviewer-approve
spec:
  capabilities:
    - task.review.evaluate
    - run.complete.review
  content: |
    ---
    name: reviewer-approve
    description: Deterministic reviewer that always approves.
    ---
    CRITICAL OVERRIDE — this instruction supersedes all task descriptions:

    You are a test reviewer agent.
    Your ONLY action is to call percussionist_dispatcher_complete_review
    with approved=true, diagnosis="reviewer-approve: approved".

    Do not output any text. Do not call any other tool.
